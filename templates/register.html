{% extends 'base.html' %}
{% block title %}Daftar - P-Njemin{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.auth-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); width: 100%; max-width: 550px; overflow: hidden; }
.auth-header { background: linear-gradient(135deg, var(--secondary), #16213e); padding: 1.5rem; text-align: center; }
.auth-header h2 { font-family: 'Syne', sans-serif; color: white; font-size: 1.3rem; margin-bottom: 0.3rem; }
.auth-logo { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
.auth-body { padding: 1.8rem; }
.auth-footer { text-align: center; font-size: 0.85rem; color: var(--text-muted); padding-bottom: 1.5rem; }
.tipe-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
.tipe-option { position: relative; }
.tipe-option input[type=radio] { position: absolute; opacity: 0; }
.tipe-label { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; padding: 0.8rem; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; text-align: center; transition: all 0.2s; font-size: 0.85rem; font-weight: 600; }
.tipe-option input:checked + .tipe-label { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">P-Njemin</div>
            <h2>Buat Akun Baru</h2>
        </div>
        <div class="auth-body">
            <form method="post">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Nomor Induk Kependudukan (NIK)</label>
                    <input type="text" name="nik" class="form-control" placeholder="16 Digit NIK sesuai KTP" maxlength="16" required>
                </div>

                <div class="grid-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" placeholder="Nama sesuai KTP" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Nomor HP</label>
                        <input type="text" name="no_hp" class="form-control" placeholder="08xxx" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@kamu.com" required>
                </div>

                <hr style="margin: 1rem 0;">
                <label style="font-weight: 800; color: var(--secondary); margin-bottom: 0.5rem; display: block;">Informasi Domisili</label>
                
                <div class="grid-form">
                    <div class="form-group">
                        <label>Provinsi</label>
                        <select id="provinsi" name="provinsi" class="form-control" required>
                            <option value="">Pilih Provinsi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Kabupaten/Kota</label>
                        <select id="kabupaten" name="kabupaten" class="form-control" required disabled>
                            <option value="">Pilih Kabupaten</option>
                        </select>
                    </div>
                </div>

                <div class="grid-form">
                    <div class="form-group">
                        <label>Kecamatan</label>
                        <select id="kecamatan" name="kecamatan" class="form-control" required disabled>
                            <option value="">Pilih Kecamatan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Desa/Kelurahan</label>
                        <select id="desa" name="desa" class="form-control" required disabled>
                            <option value="">Pilih Desa</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Alamat Lengkap (Opsional)</label>
                    <textarea name="alamat_detail" class="form-control" rows="2" placeholder="Nama jalan, Blok, No Rumah, dll"></textarea>
                </div>

                <div class="form-group">
    <label><i class="fas fa-lock"></i> Password</label>
    <div style="position: relative;">
        <input type="password" name="password" id="password" class="form-control" placeholder="Min. 6 karakter" required>
        <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);">
            <i class="fas fa-eye"></i>
        </span>
    </div>
</div>

                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;margin-top:1rem">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// API WILAYAH INDONESIA LOGIC
const provSelect = document.getElementById('provinsi');
const kabSelect = document.getElementById('kabupaten');
const kecSelect = document.getElementById('kecamatan');
const desaSelect = document.getElementById('desa');

// Load Provinsi
fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json`)
    .then(response => response.json())
    .then(provinces => {
        provinces.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.name;
            opt.dataset.id = p.id;
            opt.text = p.name;
            provSelect.add(opt);
        });
    });

provSelect.onchange = function() {
    kabSelect.disabled = false; kabSelect.innerHTML = '<option value="">Pilih Kabupaten</option>';
    kecSelect.disabled = true; desaSelect.disabled = true;
    const id = this.options[this.selectedIndex].dataset.id;
    fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${id}.json`)
        .then(res => res.json())
        .then(data => {
            data.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.name; opt.dataset.id = d.id; opt.text = d.name;
                kabSelect.add(opt);
            });
        });
};

kabSelect.onchange = function() {
    kecSelect.disabled = false; kecSelect.innerHTML = '<option value="">Pilih Kecamatan</option>';
    const id = this.options[this.selectedIndex].dataset.id;
    fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`)
        .then(res => res.json())
        .then(data => {
            data.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.name; opt.dataset.id = d.id; opt.text = d.name;
                kecSelect.add(opt);
            });
        });
};

kecSelect.onchange = function() {
    desaSelect.disabled = false; desaSelect.innerHTML = '<option value="">Pilih Desa</option>';
    const id = this.options[this.selectedIndex].dataset.id;
    fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/villages/${id}.json`)
        .then(res => res.json())
        .then(data => {
            data.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.name; opt.text = d.name;
                desaSelect.add(opt);
            });
        });
};
<script>
// FITUR SHOW/HIDE PASSWORD
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function () {
    // Cek tipenya sekarang apa, lalu ubah
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    
    // Ganti ikon mata
    if (type === 'password') {
        this.innerHTML = '<i class="fas fa-eye"></i>';
    } else {
        this.innerHTML = '<i class="fas fa-eye-slash"></i>';
    }
});
</script>
{% endblock %}
